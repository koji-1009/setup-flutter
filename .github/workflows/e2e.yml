name: E2E
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  e2e-release:
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter (stable latest)
        uses: ./
        with:
          channel: stable

      - run: flutter --version
      - run: dart --version
      - name: Verify pub get works
        run: |
          flutter create __test_app
          cd __test_app
          flutter pub get

  e2e-version:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter (exact version)
        uses: ./
        with:
          flutter-version: '3.29.0'
          channel: stable

      - run: flutter --version
      - run: dart --version

  e2e-dry-run:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter (dry-run)
        id: flutter
        uses: ./
        with:
          dry-run: true

      - name: Verify outputs
        run: |
          echo "Flutter version: ${{ steps.flutter.outputs.flutter-version }}"
          echo "Channel: ${{ steps.flutter.outputs.channel }}"
          test -n "${{ steps.flutter.outputs.flutter-version }}"

name: Cleanup PR Caches
on:
  pull_request:
    types:
      - closed

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete caches for closed PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_REF: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          echo "Listing caches for $PR_REF"
          ids=$(gh api --paginate \
            "repos/$REPO/actions/caches?ref=$PR_REF&per_page=100" \
            --jq '.actions_caches[].id')
          if [ -z "$ids" ]; then
            echo "No caches found for $PR_REF"
            exit 0
          fi
          failed=0
          for id in $ids; do
            echo "Deleting cache id=$id"
            if ! gh api -X DELETE "repos/$REPO/actions/caches/$id" --silent; then
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed cache deletion(s) failed"
          fi
          echo "Done"

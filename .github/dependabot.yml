version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "08:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 7
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    groups:
      actions-packages:
        patterns:
          - "@actions/*"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "@biomejs/biome"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "08:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      github-actions-official:
        patterns:
          - "actions/*"
